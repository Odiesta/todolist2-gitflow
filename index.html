<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>✨ My Todo List</title>
    <!-- Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .todo-enter {
        animation: slideIn 0.3s ease-out;
      }
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .line-through {
        text-decoration: line-through;
        color: #9ca3af;
      }
    </style>
  </head>
  <body
    class="bg-gradient-to-br from-indigo-50 via-white to-purple-50 min-h-screen py-8 px-4"
  >
    <div class="max-w-2xl mx-auto">
      <!-- Header -->
      <header class="text-center mb-8">
        <h1
          class="text-4xl font-bold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent mb-2"
        >
          ✨ My Todo List
        </h1>
        <p class="text-gray-600">Stay organized and productive</p>
      </header>

      <!-- Main Card -->
      <div
        class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100"
      >
        <!-- Input Section -->
        <div class="p-6 border-b border-gray-100 bg-gray-50">
          <form id="todo-form" class="flex gap-3">
            <input
              type="text"
              id="todo-input"
              placeholder="What needs to be done?"
              class="flex-1 px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
              autocomplete="off"
            />
            <button
              type="submit"
              class="px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-medium rounded-xl transition-colors shadow-md hover:shadow-lg active:scale-95"
            >
              Add
            </button>
          </form>
        </div>

        <!-- Filter Tabs -->
        <div class="flex border-b border-gray-100 bg-white">
          <button
            data-filter="all"
            class="filter-btn flex-1 py-3 px-4 text-sm font-medium text-indigo-600 border-b-2 border-indigo-600 transition"
          >
            All
          </button>
          <button
            data-filter="active"
            class="filter-btn flex-1 py-3 px-4 text-sm font-medium text-gray-500 hover:text-gray-700 transition"
          >
            Active
          </button>
          <button
            data-filter="completed"
            class="filter-btn flex-1 py-3 px-4 text-sm font-medium text-gray-500 hover:text-gray-700 transition"
          >
            Completed
          </button>
        </div>

        <!-- Todo List -->
        <ul
          id="todo-list"
          class="divide-y divide-gray-100 max-h-96 overflow-y-auto"
        >
          <!-- Todos will be injected here -->
        </ul>

        <!-- Empty State -->
        <div id="empty-state" class="hidden p-8 text-center text-gray-500">
          <svg
            class="w-16 h-16 mx-auto mb-4 text-gray-300"
            fill="none"
            stroke="currentColor"
            viewBox="0 0 24 24"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.5"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
            />
          </svg>
          <p class="font-medium">No todos yet</p>
          <p class="text-sm">Add a task to get started!</p>
        </div>

        <!-- Footer Stats -->
        <div
          class="p-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center text-sm text-gray-600"
        >
          <span id="items-left">0 items left</span>
          <button
            id="clear-completed"
            class="text-gray-500 hover:text-red-500 transition font-medium"
          >
            Clear completed
          </button>
        </div>
      </div>

      <!-- Footer -->
      <footer class="text-center mt-6 text-gray-500 text-sm">
        <p>Double-click to edit a todo • Data saved locally</p>
      </footer>
    </div>

    <script>
      // ==================== STATE ====================
      let todos = JSON.parse(localStorage.getItem("todos")) || [];
      let currentFilter = "all";

      // ==================== DOM ELEMENTS ====================
      const todoForm = document.getElementById("todo-form");
      const todoInput = document.getElementById("todo-input");
      const todoList = document.getElementById("todo-list");
      const itemsLeft = document.getElementById("items-left");
      const clearCompletedBtn = document.getElementById("clear-completed");
      const emptyState = document.getElementById("empty-state");
      const filterBtns = document.querySelectorAll(".filter-btn");

      // ==================== FUNCTIONS ====================

      // Save to localStorage
      function saveTodos() {
        localStorage.setItem("todos", JSON.stringify(todos));
      }

      // Generate unique ID
      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2);
      }

      // Add new todo
      function addTodo(text) {
        if (!text.trim()) return;

        const todo = {
          id: generateId(),
          text: text.trim(),
          completed: false,
          createdAt: new Date().toISOString(),
        };

        todos.unshift(todo);
        saveTodos();
        renderTodos();
        todoInput.value = "";
      }

      // Toggle todo completion
      function toggleTodo(id) {
        todos = todos.map((todo) =>
          todo.id === id ? { ...todo, completed: !todo.completed } : todo,
        );
        saveTodos();
        renderTodos();
      }

      // Delete todo
      function deleteTodo(id) {
        todos = todos.filter((todo) => todo.id !== id);
        saveTodos();
        renderTodos();
      }

      // Edit todo (inline)
      function editTodo(id, newText) {
        if (!newText.trim()) {
          deleteTodo(id);
          return;
        }
        todos = todos.map((todo) =>
          todo.id === id ? { ...todo, text: newText.trim() } : todo,
        );
        saveTodos();
        renderTodos();
      }

      // Clear completed todos
      function clearCompleted() {
        todos = todos.filter((todo) => !todo.completed);
        saveTodos();
        renderTodos();
      }

      // Filter todos
      function getFilteredTodos() {
        switch (currentFilter) {
          case "active":
            return todos.filter((t) => !t.completed);
          case "completed":
            return todos.filter((t) => t.completed);
          default:
            return todos;
        }
      }

      // Render todos list
      function renderTodos() {
        const filtered = getFilteredTodos();
        todoList.innerHTML = "";

        // Toggle empty state
        if (filtered.length === 0) {
          emptyState.classList.remove("hidden");
        } else {
          emptyState.classList.add("hidden");
        }

        // Render each todo
        filtered.forEach((todo) => {
          const li = document.createElement("li");
          li.className =
            "todo-enter p-4 hover:bg-gray-50 transition group flex items-center gap-3";
          li.innerHTML = `
          <input 
            type="checkbox" 
            ${todo.completed ? "checked" : ""} 
            class="w-5 h-5 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500 cursor-pointer"
            data-id="${todo.id}"
          />
          <span 
            class="flex-1 text-gray-800 ${todo.completed ? "line-through" : ""} cursor-pointer select-none"
            data-id="${todo.id}"
            ondblclick="startEdit(this)"
          >${escapeHtml(todo.text)}</span>
          <button 
            class="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition p-1"
            data-id="${todo.id}"
            aria-label="Delete todo"
          >
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
            </svg>
          </button>
        `;
          todoList.appendChild(li);
        });

        // Update stats
        const activeCount = todos.filter((t) => !t.completed).length;
        itemsLeft.textContent = `${activeCount} item${activeCount !== 1 ? "s" : ""} left`;
      }

      // Escape HTML to prevent XSS
      function escapeHtml(text) {
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      // Start inline edit
      window.startEdit = function (element) {
        const id = element.dataset.id;
        const todo = todos.find((t) => t.id === id);
        if (!todo || todo.completed) return;

        const span = element;
        const originalText = todo.text;

        const input = document.createElement("input");
        input.type = "text";
        input.value = originalText;
        input.className =
          "flex-1 px-2 py-1 border border-indigo-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500";

        input.addEventListener("blur", () => finishEdit(id, input.value, span));
        input.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            finishEdit(id, input.value, span);
          }
          if (e.key === "Escape") {
            span.textContent = escapeHtml(originalText);
          }
        });

        span.replaceWith(input);
        input.focus();
        input.select();
      };

      // Finish inline edit
      function finishEdit(id, newText, originalElement) {
        if (
          newText.trim() &&
          newText !== todos.find((t) => t.id === id)?.text
        ) {
          editTodo(id, newText);
        } else {
          renderTodos();
        }
      }

      // ==================== EVENT LISTENERS ====================

      // Add todo on form submit
      todoForm.addEventListener("submit", (e) => {
        e.preventDefault();
        addTodo(todoInput.value);
      });

      // Event delegation for todo list
      todoList.addEventListener("click", (e) => {
        const target = e.target;
        const id = target.closest("[data-id]")?.dataset.id;

        if (!id) return;

        // Toggle checkbox
        if (target.type === "checkbox") {
          toggleTodo(id);
        }

        // Delete button
        if (
          target.closest("button") &&
          target.closest("button").ariaLabel === "Delete todo"
        ) {
          deleteTodo(id);
        }

        // Toggle by clicking text (not in edit mode)
        if (target.tagName === "SPAN" && !target.closest("input")) {
          toggleTodo(id);
        }
      });

      // Clear completed
      clearCompletedBtn.addEventListener("click", clearCompleted);

      // Filter buttons
      filterBtns.forEach((btn) => {
        btn.addEventListener("click", () => {
          // Update active state
          filterBtns.forEach((b) => {
            b.classList.remove(
              "text-indigo-600",
              "border-indigo-600",
              "border-b-2",
            );
            b.classList.add("text-gray-500");
          });
          btn.classList.remove("text-gray-500");
          btn.classList.add(
            "text-indigo-600",
            "border-indigo-600",
            "border-b-2",
          );

          // Apply filter
          currentFilter = btn.dataset.filter;
          renderTodos();
        });
      });

      // Keyboard shortcut: Ctrl/Cmd + Enter to add
      todoInput.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
          e.preventDefault();
          addTodo(todoInput.value);
        }
      });

      // ==================== INIT ====================
      renderTodos();
    </script>
  </body>
</html>
